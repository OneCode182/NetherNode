name: Start Server

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "GHCR image tag to deploy."
        required: true
        default: "latest"
      repo_branch:
        description: "Repository branch to pull on EC2."
        required: true
        default: "main"

permissions:
  id-token: write
  contents: read

jobs:
  start:
    name: Start and deploy Minecraft
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
      MINECRAFT_EULA: ${{ vars.MINECRAFT_EULA || 'FALSE' }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Start EC2
        shell: bash
        run: |
          set -euo pipefail
          aws ec2 start-instances --instance-ids "$EC2_INSTANCE_ID"
          aws ec2 wait instance-running --instance-ids "$EC2_INSTANCE_ID"

      - name: Wait for SSM
        shell: bash
        run: |
          set -euo pipefail
          for _ in {1..40}; do
            status="$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${EC2_INSTANCE_ID}" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || true)"
            if [[ "$status" == "Online" ]]; then
              exit 0
            fi
            sleep 15
          done
          echo "SSM did not become Online for ${EC2_INSTANCE_ID}"
          exit 1

      - name: Deploy runtime
        shell: bash
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          REPO_BRANCH: ${{ inputs.repo_branch }}
        run: |
          set -euo pipefail
          if [[ "$MINECRAFT_EULA" != "TRUE" ]]; then
            echo "Set GitHub variable MINECRAFT_EULA=TRUE after accepting the Minecraft EULA."
            exit 1
          fi

          export IMAGE_URI="ghcr.io/${GITHUB_REPOSITORY,,}:${IMAGE_TAG}"
          export REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git"
          python - <<'PY' > /tmp/nethernode-start.json
          import json
          import os
          import shlex

          image = os.environ["IMAGE_URI"]
          repo_url = shlex.quote(os.environ["REPO_URL"])
          branch = shlex.quote(os.environ["REPO_BRANCH"])
          image_quoted = shlex.quote(image)

          commands = [
              "set -euo pipefail",
              "APP_DIR=/opt/nethernode/app",
              "DATA_DIR=/opt/nethernode/data/minecraft",
              "BACKUP_DIR=/opt/nethernode/backups",
              "sudo mkdir -p \"$APP_DIR\" \"$DATA_DIR\" \"$BACKUP_DIR\"",
              "sudo chown -R ec2-user:ec2-user /opt/nethernode",
              f"if [ ! -d \"$APP_DIR/.git\" ]; then git clone --branch {branch} {repo_url} \"$APP_DIR\"; fi",
              "cd \"$APP_DIR\"",
              "git fetch origin",
              f"git checkout {branch}",
              f"git pull --ff-only origin {branch}",
              "cp -n .env.example .env",
              f"if grep -q '^MINECRAFT_IMAGE=' .env; then sed -i 's|^MINECRAFT_IMAGE=.*|MINECRAFT_IMAGE={image}|' .env; else echo MINECRAFT_IMAGE={image_quoted} >> .env; fi",
              "sed -i 's|^MINECRAFT_EULA=.*|MINECRAFT_EULA=TRUE|' .env",
              "sed -i 's|^MINECRAFT_DATA_DIR=.*|MINECRAFT_DATA_DIR=/opt/nethernode/data/minecraft|' .env",
              "sed -i 's|^BACKUP_SOURCE=.*|BACKUP_SOURCE=/opt/nethernode/data/minecraft|' .env",
              "sed -i 's|^BACKUP_DEST=.*|BACKUP_DEST=/opt/nethernode/backups|' .env",
              "docker compose -f compose.yaml pull minecraft",
              "docker compose -f compose.yaml up -d minecraft",
              "docker compose -f compose.yaml ps",
          ]
          print(json.dumps({"commands": commands}))
          PY

          command_id="$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "NetherNode start/deploy" \
            --parameters file:///tmp/nethernode-start.json \
            --query "Command.CommandId" \
            --output text)"

          set +e
          aws ssm wait command-executed --command-id "$command_id" --instance-id "$EC2_INSTANCE_ID"
          status="$?"
          set -e
          aws ssm get-command-invocation --command-id "$command_id" --instance-id "$EC2_INSTANCE_ID" --output text
          exit "$status"

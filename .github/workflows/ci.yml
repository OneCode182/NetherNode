name: ci

on:
  pull_request:
  push:

jobs:
  windows-controller:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: PowerShell controller help smoke
        shell: pwsh
        run: .\scripts\nethernode.ps1 help
      - name: Batch launcher help smoke
        shell: cmd
        run: cmd /c scripts\nethernode.bat help

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate repository foundation and scripts
        run: |
          make validate

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Vet, test and build Go CLI
        run: |
          go vet ./...
          go test ./...
          go build ./cmd/nethernode

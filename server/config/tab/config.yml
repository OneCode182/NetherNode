# NetherNode TAB template. Installed by ops/plugins-sync.sh only when
# /data/plugins/TAB/config.yml is missing; TAB's config updater adds any
# missing keys with defaults on boot.
#
# View-only info for every player (op or not):
#   - tablist: "❤ <health> Lv <xp> | (x, y, z) | <ping>ms" next to each name
#     (the vanilla signal-bars icon stays rightmost, so ping ms sits beside it)
#   - below name (proximity): bare 5-segment health bar (1 segment = 20% = 4 HP),
#     no numbers, no heart icons

header-footer:
  enabled: false

tablist-name-formatting:
  enabled: true

scoreboard-teams:
  enabled: true
  enable-collision: true
  invisible-nametags: false
  sorting-types:
    - "PLACEHOLDER_A_TO_Z:%player%"
  case-sensitive-sorting: true
  can-see-friendly-invisibles: false

# Health + XP level + coordinates + ping inside the TAB list.
# %player_level% and %player_x/y/z% come from PlaceholderAPI's Player
# expansion (both managed by plugins-sync).
playerlist-objective:
  enabled: true
  value: "%health%"
  fancy-value: "&c❤ %health% &aLv %player_level% &8| &7(%player_x%, %player_y%, %player_z%) &8| &f%ping%ms"
  title: "Info" # Only visible on Bedrock Edition
  render-type: INTEGER

# Proximity view under the name: bare 5-segment bar, 1 segment = 20% (4 HP).
# No numbers, no heart icons here by design; the tablist carries the details.
belowname-objective:
  enabled: true
  value: "%health%"
  fancy-value: "%condition:healthbar%"
  fancy-value-default: "NPC"
  title: "HP" # Only visible to pre-1.20.3 clients, next to the raw number.

conditions:
  healthbar:
    conditions:
      - "%health%>=17"
    yes: "&a█████"
    no: "%condition:hb4%"
  hb4:
    conditions:
      - "%health%>=13"
    yes: "&a████&8█"
    no: "%condition:hb3%"
  hb3:
    conditions:
      - "%health%>=9"
    yes: "&e███&8██"
    no: "%condition:hb2%"
  hb2:
    conditions:
      - "%health%>=5"
    yes: "&c██&8███"
    no: "%condition:hb1%"
  hb1:
    conditions:
      - "%health%>=1"
    yes: "&c█&8████"
    no: "&8█████"

prevent-spectator-effect:
  enabled: false

bossbar:
  enabled: false

scoreboard:
  enabled: false

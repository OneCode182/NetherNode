# NetherNode BlueMap template. Installed by ops/plugins-sync.sh only when
# /data/plugins/BlueMap/core.conf is missing; BlueMap generates every other
# config file with defaults on first boot.

# BlueMap needs to download vanilla assets (textures) from Mojang to render
# the map. Accepting here skips the manual first-boot edit.
accept-download: true

data: "bluemap"
render-thread-count: 1
scan-for-mod-resources: true
metrics: false
